name: Deploy Ceylon Horizon

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::106806060819:role/github-actions-ceylonhorizon-deploy-role
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://ceylonhorizon-site-prod --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E3EDTRT1OVZO8A --paths "/*"
